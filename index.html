<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Web</title>
    <script>
        async function fetchSong(songId) {
            try {
                const response = await fetch(`https://api.example.com/songs/${songId}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                // Handle the song data
                console.log(data);
            } catch (error) {
                console.error('Error fetching song:', error);
            }
        }

        function playSong(songId) {
            // Implement direct streaming of the song
            const audio = new Audio(`https://api.example.com/songs/${songId}/stream`);
            audio.play().catch(error => {
                console.error('Error playing song:', error);
            });
        }

        function skipSong() {
            // Implement skip function logic
            console.log('Skipping to the next song...');
            // Logic to skip the song goes here
        }
    </script>
</head>
<body>
    <h1>Welcome to the Music Web</h1>
    <button onclick="fetchSong('123')">Fetch Song</button>
    <button onclick="playSong('123')">Play Song</button>
    <button onclick="skipSong()">Skip Song</button>
</body>
</html>
