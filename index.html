<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViSpace Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0a0a0a; /* Vi Music dark theme */
            color: #ffffff; 
            overflow: hidden; 
        }
        .glass-player {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        /* Hide scrollbars for horizontal lists */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom Sliders for Progress & Volume */
        input[type=range] {
            -webkit-appearance: none; 
            background: rgba(255, 255, 255, 0.2); 
            height: 4px; 
            border-radius: 2px; 
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            background: #ff5e3a; /* Accent color */
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        .hover-play-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .song-card:hover .hover-play-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="flex flex-col h-screen selection:bg-orange-500 selection:text-white">

    <div class="flex flex-1 overflow-hidden pb-24">
        
        <aside class="w-64 bg-[#050505] hidden md:flex flex-col py-6 px-4">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-500 to-pink-500 flex items-center justify-center shadow-lg shadow-orange-500/30">
                    <i class="fa-solid fa-play text-white text-sm ml-1"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-wide">ViSpace</h1>
            </div>

            <nav class="flex flex-col gap-2">
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-white/10 text-white font-medium"><i class="fa-solid fa-house w-5"></i> Home</a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-compass w-5"></i> Explore</a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-layer-group w-5"></i> Albums</a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-microphone-lines w-5"></i> Artists</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto hide-scroll bg-gradient-to-b from-gray-900 to-[#0a0a0a]">
            
            <header class="sticky top-0 z-10 bg-black/50 backdrop-blur-md p-6 flex justify-between items-center">
                <div class="relative w-full max-w-md">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="Search songs, albums, artists..." class="w-full bg-white/10 border border-white/5 rounded-full py-2 pl-12 pr-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-orange-500/50 transition-all">
                </div>
                <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center cursor-pointer hover:bg-gray-700">
                    <i class="fa-solid fa-user"></i>
                </div>
            </header>

            <div class="p-6">
                <h2 class="text-4xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-pink-500">Discover</h2>

                <section class="mb-10">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        Top 10 Indian Songs <i class="fa-solid fa-fire text-orange-500 text-sm"></i>
                    </h3>
                    <div class="flex gap-4 overflow-x-auto hide-scroll pb-4" id="indian-songs-container">
                        </div>
                </section>

                <section class="mb-10">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                        Top 10 International Hits <i class="fa-solid fa-globe text-blue-400 text-sm"></i>
                    </h3>
                    <div class="flex gap-4 overflow-x-auto hide-scroll pb-4" id="intl-songs-container">
                        </div>
                </section>
            </div>
        </main>
    </div>

    <div class="glass-player fixed bottom-0 left-0 w-full h-24 z-50 flex items-center justify-between px-4 md:px-8">
        
        <div class="flex items-center gap-4 w-1/4 min-w-[200px]">
            <img id="player-cover" src="https://via.placeholder.com/150" alt="Cover" class="w-14 h-14 rounded-md object-cover hidden shadow-lg">
            <div class="overflow-hidden">
                <h4 id="player-title" class="text-white font-medium text-sm truncate">Select a song to play</h4>
                <p id="player-artist" class="text-gray-400 text-xs truncate">-</p>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center w-2/4 max-w-2xl">
            <div class="flex items-center gap-6 mb-2">
                <button class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-shuffle"></i></button>
                <button onclick="prevTrack()" class="text-gray-200 hover:text-white text-lg transition-colors"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" class="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-transform shadow-lg">
                    <i id="play-pause-icon" class="fa-solid fa-play ml-1"></i>
                </button>
                <button onclick="nextTrack()" class="text-gray-200 hover:text-white text-lg transition-colors"><i class="fa-solid fa-forward-step"></i></button>
                <button class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-repeat"></i></button>
            </div>
            
            <div class="flex items-center gap-3 w-full text-xs text-gray-400 font-mono">
                <span id="current-time">0:00</span>
                <input type="range" id="seek-bar" value="0" class="w-full">
                <span id="total-time">0:00</span>
            </div>
        </div>

        <div class="flex items-center justify-end gap-3 w-1/4 min-w-[150px]">
            <i class="fa-solid fa-volume-low text-gray-400 text-sm"></i>
            <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7" class="w-24">
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script>
        // API Base URL from BillaSpace Docs
        const SPACE_API_BASE = "https://apex.spacebilla01.workers.dev";

        // MOCK DATA: Since the API doesn't have a "Top 10 Search" endpoint, we mock the UI.
        // The URLs simulate Spotify/YouTube inputs that the SPACE API can extract.
        const indianTop10 = [
            { id: "TzqIEE8bEdU", type: "yt", title: "Chaleya", artist: "Arijit Singh", cover: "https://i.scdn.co/image/ab67616d0000b27341e31d6ea1d493dd77933ee5" },
            { id: "1zLNWGk4aZ0", type: "yt", title: "O Maahi", artist: "Arijit Singh", cover: "https://i.scdn.co/image/ab67616d0000b273a7633e8b0b5f12ce3c54c33d" },
            { id: "6M_iL-kM5R0", type: "yt", title: "Heeriye", artist: "Arijit Singh, Dulquer", cover: "https://i.scdn.co/image/ab67616d0000b273c08202c50371e234d20caf62" }
        ];

        const intlTop10 = [
            { id: "fHI8X4OXluQ", type: "yt", title: "Blinding Lights", artist: "The Weeknd", cover: "https://i.scdn.co/image/ab67616d0000b2738863bc11d2cb1254472d15fd" },
            { id: "kJQP7kiw5Fk", type: "yt", title: "Despacito", artist: "Luis Fonsi", cover: "https://i.scdn.co/image/ab67616d0000b273c713b6329e4b6cc3c847eb22" },
            { id: "JGwWNGJdvx8", type: "yt", title: "Shape of You", artist: "Ed Sheeran", cover: "https://i.scdn.co/image/ab67616d0000b273ba5db46f4b838ef6027e6f96" }
        ];

        // Player Variables
        let currentPlaylist = [];
        let currentIndex = 0;
        let isPlaying = false;
        
        const audio = document.getElementById('main-audio');
        const playPauseIcon = document.getElementById('play-pause-icon');
        const seekBar = document.getElementById('seek-bar');
        const volumeBar = document.getElementById('volume-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');

        // Render UI Cards
        function renderSongs(songs, containerId) {
            const container = document.getElementById(containerId);
            songs.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = "song-card min-w-[160px] cursor-pointer group";
                card.onclick = () => loadAndPlay(songs, index);
                
                card.innerHTML = `
                    <div class="relative w-40 h-40 mb-3 rounded-xl overflow-hidden shadow-lg shadow-black/40">
                        <img src="${song.cover}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-12 h-12 rounded-full bg-orange-500 flex items-center justify-center hover:bg-orange-400 hover:scale-105 transition-all shadow-lg">
                                <i class="fa-solid fa-play text-white ml-1"></i>
                            </div>
                        </div>
                    </div>
                    <h4 class="text-white font-semibold text-sm truncate">${song.title}</h4>
                    <p class="text-gray-400 text-xs truncate mt-1">${song.artist}</p>
                `;
                container.appendChild(card);
            });
        }

        renderSongs(indianTop10, 'indian-songs-container');
        renderSongs(intlTop10, 'intl-songs-container');

        // AUDIO LOGIC USING SPACE API
        function loadAndPlay(playlist, index) {
            currentPlaylist = playlist;
            currentIndex = index;
            const song = playlist[index];

            // Update UI
            document.getElementById('player-cover').src = song.cover;
            document.getElementById('player-cover').classList.remove('hidden');
            document.getElementById('player-title').innerText = song.title;
            document.getElementById('player-artist').innerText = song.artist;

            // Resolve Space API Direct Stream Link
            // According to docs: /yt?id={id}&format=mp3&direct
            let streamUrl = "";
            if(song.type === 'yt') {
                streamUrl = `${SPACE_API_BASE}/yt?id=${song.id}&format=mp3&direct=true`;
            } else if (song.type === 'sp') {
                // Example for Spotify if you swap data: /sp?url={url}&direct
                streamUrl = `${SPACE_API_BASE}/sp?url=${encodeURIComponent(song.url)}&direct=true`;
            }

            audio.src = streamUrl;
            audio.play().then(() => {
                isPlaying = true;
                updatePlayButton();
            }).catch(e => {
                console.error("Audio playback error (CORS or Browser Policy):", e);
                alert("Playback blocked or stream unavailable. Check browser console.");
            });
        }

        function togglePlay() {
            if(!audio.src) return;
            if (audio.paused) {
                audio.play();
                isPlaying = true;
            } else {
                audio.pause();
                isPlaying = false;
            }
            updatePlayButton();
        }

        function updatePlayButton() {
            if (isPlaying) {
                playPauseIcon.className = "fa-solid fa-pause";
            } else {
                playPauseIcon.className = "fa-solid fa-play ml-1";
            }
        }

        function nextTrack() {
            if(currentPlaylist.length === 0) return;
            let nextIndex = (currentIndex + 1) % currentPlaylist.length;
            loadAndPlay(currentPlaylist, nextIndex);
        }

        function prevTrack() {
            if(currentPlaylist.length === 0) return;
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = currentPlaylist.length - 1;
            loadAndPlay(currentPlaylist, prevIndex);
        }

        // Time updates and seeking
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                seekBar.value = progressPercent;
                currentTimeEl.innerText = formatTime(audio.currentTime);
                totalTimeEl.innerText = formatTime(audio.duration);
            }
        });

        seekBar.addEventListener('input', (e) => {
            const seekTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        // Volume logic
        audio.volume = volumeBar.value;
        volumeBar.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Auto-play next track when ended
        audio.addEventListener('ended', nextTrack);

        function formatTime(seconds) {
            if(isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    </script>
</body>
</html>
